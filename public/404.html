<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var repoBase = "/sujansky-website/";
        var path = window.location.pathname;
        var relativePath = path.indexOf(repoBase) === 0 ? path.slice(repoBase.length) : "";
        var search = window.location.search || "";
        var hash = window.location.hash || "";
        sessionStorage.setItem("spa-redirect", relativePath + search + hash);
        window.location.replace(repoBase);
      })();
    </script>
  </head>
  <body></body>
</html>
