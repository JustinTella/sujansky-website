<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You | Ulrike Sujansky, M.D.</title>
    <meta
      name="description"
      content="Thank you for contacting Ulrike Sujansky, M.D. We have received your submission."
    />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f5f1;
        color: #1f2d59;
        font-family: "EB Garamond", Garamond, "Times New Roman", serif;
      }

      .card {
        width: min(640px, calc(100vw - 40px));
        padding: 48px 40px;
        background: #ffffff;
        border: 1px solid #d8d5cd;
        box-shadow: 0 18px 48px rgba(20, 28, 61, 0.08);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.25rem, 5vw, 3.25rem);
        line-height: 1.05;
      }

      .line {
        width: 64px;
        height: 4px;
        margin: 18px auto 24px;
        background: #cba04a;
      }

      p {
        margin: 0;
        font-size: 1.2rem;
        line-height: 1.7;
        color: rgba(31, 45, 89, 0.82);
      }

      a {
        display: inline-block;
        margin-top: 28px;
        color: #1f2d59;
        font-size: 1.05rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-decoration: none;
        border-bottom: 1px solid #cba04a;
        padding-bottom: 4px;
      }

      a:hover {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Thank You</h1>
      <div class="line"></div>
      <p>
        Your message has been received. We appreciate you reaching out and will
        be in touch soon.
      </p>
      <a href="/">Return to Homepage</a>
    </main>
  </body>
</html>
